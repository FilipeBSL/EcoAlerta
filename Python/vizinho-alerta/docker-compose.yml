version: '3.9'

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: vizinho-alerta-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vizinho}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vizinho123}
      POSTGRES_DB: ${POSTGRES_DB:-vizinhoalerta}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vizinho -d vizinhoalerta']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vizinho-alerta-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vizinho-alerta-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vizinho}:${POSTGRES_PASSWORD:-vizinho123}@postgres:5432/${POSTGRES_DB:-vizinhoalerta}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
