version: '3.9'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: ecoalerta_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ecoalerta}
      POSTGRES_USER: ${DB_USER:-ecoalerta}
      POSTGRES_PASSWORD: ${DB_PASS:-ecoalerta123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    networks:
      - ecoalerta_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ecoalerta} -d ${DB_NAME:-ecoalerta}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: ecoalerta_storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ecoalerta_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoalerta_api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ecoalerta}
      DB_USER: ${DB_USER:-ecoalerta}
      DB_PASS: ${DB_PASS:-ecoalerta123}
      JWT_SECRET: ${JWT_SECRET:-sua_chave_secreta_jwt_muito_segura_2026}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-ecoalerta-fotos}
      SMTP_HOST: ${SMTP_HOST:-smtp.ethereal.email}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@ecoalerta.local}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      MUNICIPIO_LAT_MIN: ${MUNICIPIO_LAT_MIN:--24.0}
      MUNICIPIO_LAT_MAX: ${MUNICIPIO_LAT_MAX:--23.0}
      MUNICIPIO_LNG_MIN: ${MUNICIPIO_LNG_MIN:--47.0}
      MUNICIPIO_LNG_MAX: ${MUNICIPIO_LNG_MAX:--46.0}
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ecoalerta_network
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecoalerta_web
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001/api/v1}
    networks:
      - ecoalerta_network
    ports:
      - "3000:80"
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: ecoalerta_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ecoalerta_network

volumes:
  postgres_data:
  minio_data:

networks:
  ecoalerta_network:
    driver: bridge
